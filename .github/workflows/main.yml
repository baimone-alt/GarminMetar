name: Build Forerunner 255 App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # Aggiornato per Node 24

      - name: Setup Java
        uses: actions/setup-java@v4 # Aggiornato per Node 24
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Developer Key
        run: openssl genrsa -out developer_key.der 4096

      - name: Build with Connect IQ
        # Questa è l'unica Action ufficiale che GitHub non può bloccare
        uses: achimbode/monkeyc-build-action@v1
        with:
          project_name: 'MetarApp'
          device: 'fr255'
          developer_key: './developer_key.der'

      - name: Upload PRG
        uses: actions/upload-artifact@v4
        with:
          name: GarminApp_FR255
          path: "**/*.prg"
