name: Build Forerunner 255 App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: florisfiedler/monkeyc-sdk:latest # Usiamo un'immagine pronta
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Developer Key
        run: openssl genrsa -out developer_key.der 4096

      - name: Build App
        run: |
          # Questo comando compila l'app "manualmente" nel cloud
          monkeyc -o MetarFR255.prg \
          -f monkey.jungle \
          -y developer_key.der \
          -d fr255 \
          -w

      - name: Upload PRG
        uses: actions/upload-artifact@v4
        with:
          name: GarminApp_FR255
          path: ./*.prg
